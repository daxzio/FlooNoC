variables:
  QUESTA_SEPP: questa-2025.1
  VCS_SEPP: vcs-2025.06
  BENDER: bender
  BENDER_GIT_SUBMODULES: false
  UV_LINK_MODE: copy

default:
  interruptible: true
  before_script:
    - export BENDER_DB_DIR=$CACHEDIR/bender
    - export UV_CACHE_DIR=$CACHEDIR/uv

stages:
  - build
  - run

compile-vsim:
  stage: build
  script:
    - make compile-vsim | tee compile.log 2>&1
    - '! grep "\*\* Error" compile.log'
  artifacts:
    paths:
      - scripts/
      - work/
      - modelsim.ini

compile-vcs:
  stage: build
  parallel:
    matrix:
      - TB_DUT:
        - tb_floo_router
        - tb_floo_axi_chimney
        - tb_floo_nw_chimney
        - tb_floo_rob
  script:
    - make compile-vcs | tee compile.log 2>&1
  artifacts:
    paths:
      - bin/

compile-meshes:
  stage: build
  parallel:
    matrix:
      - DUT: [axi_mesh, nw_mesh]
        ROUTE_ALGO: [xy, yx, src, id]
  script:
    - uv run floogen rtl -c floogen/examples/${DUT}_${ROUTE_ALGO}.yml -o generated --no-format
    # Compile the network
    - make compile-vsim TB_DUT=tb_floo_${DUT} WORK="work_${DUT}_${ROUTE_ALGO}" | tee compile.log 2>&1
    - '! grep "\*\* Error" compile.log'
  artifacts:
    paths:
      - work_*/

run-sim:
  stage: run
  needs:
    - compile-vsim
    - compile-vcs
  parallel:
    matrix:
      - SIMULATOR: [vsim, vcs]
        TB_DUT:
        - tb_floo_router
        - tb_floo_axi_chimney
        - tb_floo_nw_chimney
        - tb_floo_rob
  script:
    - |
      if [ "${SIMULATOR}" = "vsim" ]; then
        make run-${SIMULATOR}-batch | tee ${SIMULATOR}.log 2>&1
        grep "Errors: 0," ${SIMULATOR}.log
      else
        make run-${SIMULATOR}-batch
      fi

run-traffic-builtin:
  stage: run
  needs:
    - compile-meshes
  parallel:
    matrix:
      - DUT: [axi_mesh, nw_mesh]
        ROUTE_ALGO: [xy, yx, src, id]
        TRAFFIC_TYPE: [uniform, hbm, shuffle, hotspot]
        TRAFFIC_RW: [read, write]
  script:
    - |
      uv run --locked floogen traffic \
        --config floogen/examples/${DUT}_${ROUTE_ALGO}.yml \
        --traffic-type ${TRAFFIC_TYPE} \
        --traffic-rw ${TRAFFIC_RW} \
        --traffic-name ${DUT}_${ROUTE_ALGO} \
        -o generated/jobs
    - make run-vsim-batch TB_DUT=tb_floo_${DUT} WORK=work_${DUT}_${ROUTE_ALGO} TRAFFIC_NAME=${DUT}_${ROUTE_ALGO} | tee vsim.log 2>&1
    - 'grep "Errors: 0," vsim.log'

run-traffic-cfg:
  stage: run
  needs:
    - compile-meshes
  parallel:
    matrix:
      - DUT: [axi_mesh, nw_mesh]
        ROUTE_ALGO: [xy]
  script:
    - |
      uv run --locked floogen traffic \
        --config floogen/examples/${DUT}_${ROUTE_ALGO}.yml \
        --traffic-cfg floogen/examples/traffic/${DUT}_${ROUTE_ALGO}.yml \
        --traffic-name ${DUT}_${ROUTE_ALGO} \
        -o generated/jobs
    - make run-vsim-batch TB_DUT=tb_floo_${DUT} WORK=work_${DUT}_${ROUTE_ALGO} TRAFFIC_NAME=${DUT}_${ROUTE_ALGO} | tee vsim.log 2>&1
    - 'grep "Errors: 0," vsim.log'

###################
# Physical Design #
###################

init-pd:
  stage: build
  script:
    - make init-pd
  artifacts:
    paths:
      - pd/ci.yml

subpipe:
  stage: build
  needs:
    - init-pd
  trigger:
    include:
      - artifact: pd/ci.yml
        job: init-pd
    strategy: depend
